          </svg>
          <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">

  <script>
    const btn = document.getElementById('themeToggle');
    const sunIcon = document.getElementById('sun-icon');
    const moonIcon = document.getElementById('moon-icon');
    const html = document.documentElement;

    function setDark(dark) {
      if (dark) {
        html.setAttribute('data-theme', 'dark');
        sunIcon.style.display = 'none';
        moonIcon.style.display = '';
        localStorage.setItem('theme', 'dark');
      } else {
        html.removeAttribute('data-theme');
        sunIcon.style.display = '';
        moonIcon.style.display = 'none';
        localStorage.setItem('theme', 'light');
      }
    }

    setDark(localStorage.getItem('theme') === 'dark');

    btn.addEventListener('click', () => {
      setDark(html.getAttribute('data-theme') !== 'dark');
    });
  </script>

</body>
</html>
